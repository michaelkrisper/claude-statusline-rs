name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  # portable artifact: overrides the repo-local target-cpu=native
  RUSTFLAGS: -C target-cpu=x86-64

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup update stable && rustup default stable && rustup target add x86_64-unknown-linux-musl
      - run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: cargo test
      - run: cargo build --release --target x86_64-unknown-linux-musl
      - run: cp target/x86_64-unknown-linux-musl/release/statusline statusline-x86_64-unknown-linux-musl
      - run: gh release create "$GITHUB_REF_NAME" statusline-x86_64-unknown-linux-musl --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
